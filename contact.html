<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTS GARAGE | Order Online</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInScale {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }
    .fade-in-scale {
      animation: fadeInScale 0.8s ease-out forwards;
    }
    .form-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      transition: all 0.3s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: #38bdf8;
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
    }
    ::placeholder { color: #6b7280; }

    /* Custom Mobile Menu Styling */
    #menu.active {
      display: flex !important;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="relative min-h-screen bg-gray-900 flex flex-col items-center justify-start overflow-x-hidden">

  <img src="peakpx.jpg" class="absolute inset-0 w-full h-full object-cover z-0" alt="Background" />
  <div class="absolute inset-0 bg-black/70 z-0"></div>

  <header class="fixed top-0 w-full z-50 backdrop-blur-md bg-black/20 border-b border-white/10">
    <div class="mx-auto flex items-center justify-between py-4 px-6 max-w-7xl">
      <a href="index.html" class="text-xl sm:text-2xl font-black text-white tracking-tighter">JTS GARAGE</a>
      
      <div class="sm:hidden">
        <button id="menu-toggle" class="font-bold text-white focus:outline-none p-2 border border-white/20 rounded-lg">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
      </div>

      <nav id="menu" class="hidden sm:flex">
        <ul class="flex flex-col gap-y-4 sm:flex-row sm:gap-x-8">
          <li><a href="index.html" class="text-xs font-bold text-white hover:text-sky-400 transition uppercase">Home</a></li>
          <li><a href="toys.html" class="text-xs font-bold text-white hover:text-sky-400 transition uppercase">Mini Games</a></li>
          <li><a href="products.html" class="text-xs font-bold text-white hover:text-sky-400 transition uppercase border-b-2 border-sky-500 pb-1 sm:border-0 sm:pb-0">Products</a></li>
          <li><a href="contact.html" class="text-xs font-bold text-white hover:text-sky-400 transition uppercase">Order Online</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="relative z-10 mt-24 mb-24 w-full max-w-7xl px-4 fade-in-scale">
    <div class="bg-black/80 backdrop-blur-2xl border border-white/20 p-5 md:p-10 rounded-[2rem] sm:rounded-[3rem] shadow-2xl">
      
      <div class="mb-8 text-center">
        <h2 class="text-3xl sm:text-4xl font-black text-white uppercase tracking-widest">Checkout</h2>
        <div class="h-1 w-20 bg-sky-500 mx-auto mt-3"></div>
      </div>

      <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
        
        <div class="lg:w-2/3">
          <h3 class="text-white font-bold uppercase tracking-tighter mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-sky-500 rounded-full"></span> 1. Select Products
          </h3>
          
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            
            <div class="flex items-center gap-4 bg-white/5 border border-white/10 p-3 rounded-2xl hover:border-sky-500/50 transition duration-300">
              <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 rounded-xl flex-shrink-0 overflow-hidden border border-white/10">
                <img src="images/lynx.jpg" alt="Exhaust" class="w-full h-full object-cover">
              </div>
              <div class="flex-grow">
                <h4 class="text-white font-bold text-sm uppercase leading-tight">BOM X LYNX</h4>
                <p class="text-sky-400 text-xs font-black mt-1">₱6,500</p>
                <button class="mt-2 w-full sm:w-auto bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition">Add</button>
              </div>
            </div>

            <div class="flex items-center gap-4 bg-white/5 border border-white/10 p-3 rounded-2xl hover:border-sky-500/50 transition duration-300">
              <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 rounded-xl flex-shrink-0 overflow-hidden border border-white/10">
                <img src="images/rearshock.jpg" alt="Shocks" class="w-full h-full object-cover">
              </div>
              <div class="flex-grow">
                <h4 class="text-white font-bold text-sm uppercase leading-tight">PZTECH 330 MM</h4>
                <p class="text-sky-400 text-xs font-black mt-1">₱4,500</p>
                <button class="mt-2 w-full sm:w-auto bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition">Add</button>
              </div>
            </div>

            <div class="flex items-center gap-4 bg-white/5 border border-white/10 p-3 rounded-2xl hover:border-sky-500/50 transition duration-300">
              <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 rounded-xl flex-shrink-0 overflow-hidden border border-white/10">
                <img src="images/caliper.jpg" alt="Caliper" class="w-full h-full object-cover">
              </div>
              <div class="flex-grow">
                <h4 class="text-white font-bold text-sm uppercase leading-tight">BREMBO 4POT</h4>
                <p class="text-sky-400 text-xs font-black mt-1">₱11,000</p>
                <button class="mt-2 w-full sm:w-auto bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition">Add</button>
              </div>
            </div>

            <div class="flex items-center gap-4 bg-white/5 border border-white/10 p-3 rounded-2xl hover:border-sky-500/50 transition duration-300">
              <div class="w-20 h-20 sm:w-24 sm:h-24 bg-gray-800 rounded-xl flex-shrink-0 overflow-hidden border border-white/10">
                <img src="images/pipe.jpg" alt="Pipe" class="w-full h-full object-cover">
              </div>
              <div class="flex-grow">
                <h4 class="text-white font-bold text-sm uppercase leading-tight">TRC Pipe</h4>
                <p class="text-sky-400 text-xs font-black mt-1">₱2,300</p>
                <button class="mt-2 w-full sm:w-auto bg-sky-600 hover:bg-sky-500 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase transition">Add</button>
              </div>
            </div>

          </div>
        </div>

        <div class="lg:w-1/3 border-t lg:border-t-0 lg:border-l border-white/10 pt-8 lg:pt-0 lg:pl-10">
          <h3 class="text-white font-bold uppercase tracking-tighter mb-6 flex items-center gap-2">
            <span class="w-2 h-6 bg-yellow-500 rounded-full"></span> 2. Details
          </h3>
          
          <form class="space-y-4">
            <div>
              <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">Name</label>
              <input type="text" placeholder="Full Name" class="form-input w-full p-4 rounded-2xl text-sm" required>
            </div>
            
            <div>
              <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">Phone</label>
              <input type="tel" placeholder="09XX XXX XXXX" class="form-input w-full p-4 rounded-2xl text-sm" required>
            </div>
            
            <div>
              <label class="block text-gray-400 text-[10px] uppercase font-bold mb-1 ml-1">Address</label>
              <textarea rows="2" placeholder="Street, City" class="form-input w-full p-4 rounded-2xl text-sm resize-none" required></textarea>
            </div>

            <div class="hidden sm:block pt-4 border-t border-white/10 mt-6">
              <div class="flex justify-between text-white font-black text-xl mb-6">
                <span>Total:</span>
                <span class="text-sky-400">₱0.00</span>
              </div>
              <button type="submit" class="w-full bg-sky-500 text-white font-black py-4 rounded-2xl hover:bg-sky-400 transition duration-300 uppercase text-xs tracking-widest shadow-lg shadow-sky-500/20">
                Confirm Order
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>

  <div class="fixed bottom-0 w-full sm:hidden z-50 bg-black/90 backdrop-blur-xl border-t border-white/10 p-4 flex justify-between items-center">
    <div>
      <p class="text-gray-400 text-[10px] uppercase">Total Amount</p>
      <p class="text-sky-400 font-black text-lg">₱0.00</p>
    </div>
    <button class="bg-sky-500 text-white px-8 py-3 rounded-xl font-bold uppercase text-xs tracking-widest">
      Checkout
    </button>
  </div>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
    });
  </script>

</body>
</html>
